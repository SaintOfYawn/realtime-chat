version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: chatdb
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://chatuser:chatpass@postgres:5432/chatdb
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: "change_me_super_secret"
      JWT_ACCESS_TTL_MIN: "120"
      CORS_ORIGINS: "http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: "http://localhost:8000"
      VITE_WS_URL: "ws://localhost:8000"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
